services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: cms_auto
      POSTGRES_USER: cms_auto
      POSTGRES_PASSWORD: cms_auto_dev
      # Defaults to trust for local dev only. Set POSTGRES_HOST_AUTH_METHOD to
      # scram-sha-256 or md5 before any staging/production deployment.
      POSTGRES_HOST_AUTH_METHOD: ${POSTGRES_HOST_AUTH_METHOD:-trust}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-cms_auto_minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-cms_auto_minio_dev}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      NODE_ENV: development
      PORT: "3000"
      # Dev-only connection strings, not secrets. They reuse the postgres
      # service credentials declared above and the redis service host.
      DATABASE_URL: postgres://cms_auto:cms_auto_dev@postgres:5432/cms_auto
      REDIS_URL: redis://redis:6379
      ATTACHMENT_STORAGE_DRIVER: ${ATTACHMENT_STORAGE_DRIVER:-memory}
      ATTACHMENT_S3_ENDPOINT: ${ATTACHMENT_S3_ENDPOINT:-}
      ATTACHMENT_S3_REGION: ${ATTACHMENT_S3_REGION:-}
      ATTACHMENT_S3_BUCKET: ${ATTACHMENT_S3_BUCKET:-}
      ATTACHMENT_S3_ACCESS_KEY_ID: ${ATTACHMENT_S3_ACCESS_KEY_ID:-}
      ATTACHMENT_S3_SECRET_ACCESS_KEY: ${ATTACHMENT_S3_SECRET_ACCESS_KEY:-}
      ATTACHMENT_S3_FORCE_PATH_STYLE: ${ATTACHMENT_S3_FORCE_PATH_STYLE:-true}
      ATTACHMENT_DOWNLOAD_TTL_SECONDS: ${ATTACHMENT_DOWNLOAD_TTL_SECONDS:-300}
    ports:
      - "3000:3000"
    depends_on:
      - postgres
      - redis

  worker:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    command: ["node", "dist/worker/index.js"]
    environment:
      NODE_ENV: development
      DATABASE_URL: postgres://cms_auto:cms_auto_dev@postgres:5432/cms_auto
      REDIS_URL: redis://redis:6379
      ATTACHMENT_STORAGE_DRIVER: ${ATTACHMENT_STORAGE_DRIVER:-memory}
      ATTACHMENT_S3_ENDPOINT: ${ATTACHMENT_S3_ENDPOINT:-}
      ATTACHMENT_S3_REGION: ${ATTACHMENT_S3_REGION:-}
      ATTACHMENT_S3_BUCKET: ${ATTACHMENT_S3_BUCKET:-}
      ATTACHMENT_S3_ACCESS_KEY_ID: ${ATTACHMENT_S3_ACCESS_KEY_ID:-}
      ATTACHMENT_S3_SECRET_ACCESS_KEY: ${ATTACHMENT_S3_SECRET_ACCESS_KEY:-}
      ATTACHMENT_S3_FORCE_PATH_STYLE: ${ATTACHMENT_S3_FORCE_PATH_STYLE:-true}
      ATTACHMENT_DOWNLOAD_TTL_SECONDS: ${ATTACHMENT_DOWNLOAD_TTL_SECONDS:-300}
    depends_on:
      - postgres
      - redis

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    environment:
      NODE_ENV: development
      PORT: "4000"
      API_URL: http://api:3000
    ports:
      - "4000:4000"
    depends_on:
      - api

volumes:
  postgres-data:
  minio-data:
