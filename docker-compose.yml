services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: cms_auto
      POSTGRES_USER: cms_auto
      POSTGRES_PASSWORD: cms_auto_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  postgres-data:
