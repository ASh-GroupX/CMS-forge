name: cms-auto-prod

services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    environment:
      SITE_DOMAIN: ${SITE_DOMAIN}
      ACME_EMAIL: ${ACME_EMAIL}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      web:
        condition: service_healthy
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/health >/dev/null"]
      interval: 30s
      timeout: 5s
      retries: 5
    networks:
      - public
      - internal

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: "4000"
      API_URL: http://api:3000
    expose:
      - "4000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:4000/ >/dev/null"]
      interval: 30s
      timeout: 5s
      retries: 5
    depends_on:
      api:
        condition: service_healthy
    networks:
      - internal

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: "3000"
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      EMAIL_PROVIDER_DRIVER: smtp
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_FROM: ${SMTP_FROM}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_SECURE: ${SMTP_SECURE}
      ATTACHMENT_STORAGE_DRIVER: s3
      ATTACHMENT_S3_ENDPOINT: ${ATTACHMENT_S3_ENDPOINT}
      ATTACHMENT_S3_REGION: ${ATTACHMENT_S3_REGION}
      ATTACHMENT_S3_BUCKET: ${ATTACHMENT_S3_BUCKET}
      ATTACHMENT_S3_ACCESS_KEY_ID: ${ATTACHMENT_S3_ACCESS_KEY_ID}
      ATTACHMENT_S3_SECRET_ACCESS_KEY: ${ATTACHMENT_S3_SECRET_ACCESS_KEY}
      ATTACHMENT_S3_FORCE_PATH_STYLE: ${ATTACHMENT_S3_FORCE_PATH_STYLE}
      ATTACHMENT_DOWNLOAD_TTL_SECONDS: ${ATTACHMENT_DOWNLOAD_TTL_SECONDS}
    expose:
      - "3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/health >/dev/null"]
      interval: 30s
      timeout: 5s
      retries: 5
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal

  migrate:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: "no"
    command:
      [
        "node",
        "/app/node_modules/prisma/build/index.js",
        "migrate",
        "deploy",
        "--schema",
        "/app/packages/database/prisma/schema.prisma"
      ]
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal

  worker:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    command: ["node", "dist/worker/index.js"]
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      EMAIL_PROVIDER_DRIVER: smtp
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_FROM: ${SMTP_FROM}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_SECURE: ${SMTP_SECURE}
      ATTACHMENT_STORAGE_DRIVER: s3
      ATTACHMENT_S3_ENDPOINT: ${ATTACHMENT_S3_ENDPOINT}
      ATTACHMENT_S3_REGION: ${ATTACHMENT_S3_REGION}
      ATTACHMENT_S3_BUCKET: ${ATTACHMENT_S3_BUCKET}
      ATTACHMENT_S3_ACCESS_KEY_ID: ${ATTACHMENT_S3_ACCESS_KEY_ID}
      ATTACHMENT_S3_SECRET_ACCESS_KEY: ${ATTACHMENT_S3_SECRET_ACCESS_KEY}
      ATTACHMENT_S3_FORCE_PATH_STYLE: ${ATTACHMENT_S3_FORCE_PATH_STYLE}
      ATTACHMENT_DOWNLOAD_TTL_SECONDS: ${ATTACHMENT_DOWNLOAD_TTL_SECONDS}
      SLA_JOB_INTERVAL_MS: ${SLA_JOB_INTERVAL_MS}
      NOTIFICATION_JOB_INTERVAL_MS: ${NOTIFICATION_JOB_INTERVAL_MS}
    depends_on:
      api:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "tr '\\0' ' ' < /proc/1/cmdline | grep -q 'dist/worker/index.js'"]
      interval: 30s
      timeout: 5s
      retries: 5
    networks:
      - internal

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 30s
      timeout: 5s
      retries: 5
    networks:
      - internal

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["sh", "-c", "redis-server --appendonly yes --requirepass \"$${REDIS_PASSWORD}\""]
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD}\" ping | grep PONG"]
      interval: 30s
      timeout: 5s
      retries: 5
    networks:
      - internal

networks:
  public:
  internal:
    internal: true

volumes:
  caddy-data:
  caddy-config:
  postgres-data:
  redis-data:
